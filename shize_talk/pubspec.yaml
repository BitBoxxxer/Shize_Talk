name: shize_talk
description: "Kasey's Messanger from 26 year"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 0.2.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.16.0
  image_picker: ^1.1.2
  image: ^4.2.0
  video_player: ^2.9.2       # превью видео при выборе участка для гифки
  video_thumbnail: ^0.5.3    # кадр видео для отображения в кроппере
  path_provider: ^2.1.4      # временные файлы при экспорте видео→гифка
  ffmpeg_kit_flutter_new: ^4.1.0
  shared_preferences: ^2.3.3  # локальный device_id + кэш выбранного языка

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo.jpg
