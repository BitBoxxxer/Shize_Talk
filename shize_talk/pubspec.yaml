name: shize_talk
description: "Kasey's Messanger from 26 year"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 0.3.0beta

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.16.0
  image_picker: ^1.1.2
  image: ^4.2.0
  video_player: ^2.9.2       # превью видео при выборе участка для гифки
  video_thumbnail: ^0.5.3    # извлечение кадров видео (замена ffmpeg — см. video_to_gif_screen.dart)
  shared_preferences: ^2.3.3  # локальный device_id + кэш выбранного языка
  # --- Вложения в чате (фото/файлы) ---
  file_picker: ^11.0.2       # выбор произвольного файла (любой формат, до 20 МБ)
  url_launcher: ^6.3.2       # открыть файл-вложение во внешнем приложении/браузере

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/logo.jpg"

flutter:
  uses-material-design: true
  assets:
    - lib/assets/logo.jpg
